<script type="module">
  // Firebase SDKs Import करणे
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { 
      getFirestore, collection, addDoc, getDocs, onSnapshot, 
      query, where, orderBy, deleteDoc, doc, updateDoc, serverTimestamp 
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  // तुमचे Configuration (हे बरोबर आहे)
  const firebaseConfig = {
    apiKey: "AIzaSyCYt-GaHe9FN3Hk5ULWMNIVeRcOMkcKK-8",
    authDomain: "hapan-d4d75.firebaseapp.com",
    databaseURL: "https://hapan-d4d75-default-rtdb.firebaseio.com",
    projectId: "hapan-d4d75",
    storageBucket: "hapan-d4d75.firebasestorage.app",
    messagingSenderId: "558946058796",
    appId: "1:558946058796:web:2592756709069c5e764789",
    measurementId: "G-9JRHTYMVPW"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // --- Functions ---

  // 1. Applications Load करणे
  const qApps = query(collection(db, "applications"), orderBy("appliedAt", "desc"));
  onSnapshot(qApps, (snapshot) => {
      const recentTable = document.getElementById('recentAppsTable');
      document.getElementById('countApps').innerText = snapshot.size;
      let rows = "";
      snapshot.forEach((docSnap) => {
          const appData = docSnap.data();
          const statusClass = appData.status === 'Approved' ? 'badge-approved' : 'badge-pending';
          rows += `<tr>
              <td class="ps-4 fw-bold">${appData.studentName}</td>
              <td>${appData.jobTitle}</td>
              <td>${appData.companyName}</td>
              <td><span class="badge ${statusClass} rounded-pill px-3">${appData.status || 'Pending'}</span></td>
              <td class="text-end pe-4">
                  <button onclick="approveApplication('${docSnap.id}')" class="btn btn-sm btn-light text-success me-1"><i class="bi bi-check"></i></button>
                  <button onclick="deleteApplication('${docSnap.id}')" class="btn btn-sm btn-light text-danger"><i class="bi bi-trash"></i></button>
              </td>
          </tr>`;
      });
      recentTable.innerHTML = snapshot.empty ? "<tr><td colspan='5' class='text-center p-4'>No Data</td></tr>" : rows;
  });

  // 2. Approve & Delete Functions (Window object ला जोडले कारण ते module मध्ये आहेत)
  window.approveApplication = async (id) => { 
      if(confirm("Approve?")) {
          const appRef = doc(db, "applications", id);
          await updateDoc(appRef, { status: "Approved" });
      }
  };

  window.deleteApplication = async (id) => { 
      if(confirm("Delete?")) await deleteDoc(doc(db, "applications", id)); 
  };

  // 3. Job Posting
  document.getElementById('jobPostForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
          await addDoc(collection(db, "jobs"), {
              title: document.getElementById('jobTitle').value,
              company: document.getElementById('companyName').value,
              salary: document.getElementById('salary').value,
              type: document.getElementById('jobType').value,
              postedAt: serverTimestamp()
          });
          alert("Job Posted!"); 
          document.getElementById('jobPostForm').reset();
      } catch (err) { console.error(err); }
  });

  // 4. Jobs List Load करणे
  const qJobs = query(collection(db, "jobs"), orderBy("postedAt", "desc"));
  onSnapshot(qJobs, (snapshot) => {
      const table = document.getElementById('manageJobsTable');
      let rows = "";
      snapshot.forEach(docSnap => {
          const job = docSnap.data();
          rows += `<tr><td class="ps-4 fw-bold">${job.title}</td><td>${job.company}</td><td>${job.salary}</td><td class="text-end pe-4"><button onclick="deleteJob('${docSnap.id}')" class="btn btn-light btn-sm text-danger"><i class="bi bi-trash"></i></button></td></tr>`;
      });
      table.innerHTML = rows;
  });

  window.deleteJob = async (id) => { if(confirm("Delete job?")) await deleteDoc(doc(db, "jobs", id)); };

  // 5. Students & Companies Fetching
  window.fetchUsers = async (role) => {
      const tableBody = document.getElementById('tableBody');
      const tableHeader = document.getElementById('tableHeader');
      tableHeader.innerHTML = `<tr><th class="ps-4">Name</th><th>Email</th><th>Phone</th><th class="text-end pe-4">Action</th></tr>`;
      
      const qUsers = query(collection(db, "users"), where("role", "==", role));
      const querySnapshot = await getDocs(qUsers);
      tableBody.innerHTML = "";
      querySnapshot.forEach(docSnap => {
          const u = docSnap.data();
          tableBody.innerHTML += `<tr><td class="ps-4 fw-semibold">${u.fullName}</td><td>${u.email}</td><td>${u.phone || 'N/A'}</td><td class="text-end pe-4"><button class="btn btn-light btn-sm text-danger"><i class="bi bi-trash"></i></button></td></tr>`;
      });
  };

  // 6. Sidebar & Section Logic (Module मध्ये असल्यामुळे window ला दिले)
  window.showSection = (section, element) => {
      document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
      if(element) element.classList.add('active');
      
      const titleMap = { 'dashboard': 'Overview', 'addJob': 'Post Job', 'students': 'Students', 'companies': 'Companies', 'analytics': 'Analytics', 'settings': 'Settings' };
      document.getElementById('sectionTitle').innerText = titleMap[section];

      if (section === 'students' || section === 'companies') {
          document.getElementById('tableSection').classList.add('active');
          window.fetchUsers(section === 'students' ? 'Student' : 'Company');
      } else {
          document.getElementById(section).classList.add('active');
      }
      if(window.innerWidth < 992) window.toggleSidebar();
  };

  window.toggleSidebar = () => {
      document.getElementById('sidebar').classList.toggle('active');
      document.getElementById('overlay').classList.toggle('show');
  };

  // 7. Logout
  document.getElementById('logoutBtn').addEventListener('click', () => {
      signOut(auth).then(() => window.location.href = "login.html");
  });

  // 8. Real-time Counts
  onSnapshot(query(collection(db, "users"), where("role", "==", "Student")), snap => document.getElementById('countStudents').innerText = snap.size);
  onSnapshot(query(collection(db, "users"), where("role", "==", "Company")), snap => document.getElementById('countCompanies').innerText = snap.size);

</script>
