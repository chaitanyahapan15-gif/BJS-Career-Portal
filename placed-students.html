            container.innerHTML = "<div class='col-12 text-center'><p class='text-muted'>No success stories yet. Be the first one!</p></div>";

            const card = `
                <div class="col-md-6 col-lg-4">
                    <div class="card student-card p-4 h-100">
                        <div class="d-flex align-items-center mb-3">

                        <hr>

            `;
